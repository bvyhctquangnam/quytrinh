<!DOCTYPE html>
<html lang="vi">
<head>
    <!-- Nếu file ảnh của bạn là favicon.png -->
    <link rel="icon" href="./favicon.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Quy trình - BV YHCT Quảng Nam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="./scripts.js" defer></script>
</head>
<body>
<div class="container">
    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-hospital-user"></i> Quy trình chuyên môn</h2>	    
            <div class="hospital-name">Bệnh viện Y học cổ truyền Quảng Nam</div>
	    <div class="login-logo">
            	<img src="./favicon.png" alt="Logo Bệnh viện" style="width: 100px; height: auto; margin-bottom: 5px;">
            </div>
            <input type="text" id="username" class="login-input" placeholder="Tên đăng nhập" autocomplete="off">
            <input type="password" id="password" class="login-input" placeholder="Mật khẩu">
            <button id="loginBtn" class="login-btn">Đăng nhập</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <!-- Nội dung chính sau khi đăng nhập -->
    <div id="mainContent" class="main-content">
        <div class="header">
            <h1><i class="fas fa-notes-medical"></i> Quản lý quy trình chuyên môn</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="badge-count">                    	
			<i class="fas fa-yin-yang"></i> Bệnh viện Y học cổ truyền Quảng Nam
                </div>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="vertical-tabs">
                <div class="linh-vuc-title">LĨNH VỰC</div>
                <button class="tab-btn-vertical active" data-tab="quanly"><i class="fas fa-building"></i> Quản lý</button>
                <button class="tab-btn-vertical" data-tab="dieutri"><i class="fas fa-stethoscope"></i> Điều trị</button>
                <button class="tab-btn-vertical" data-tab="chamsoc"><i class="fas fa-hand-sparkles"></i> Chăm sóc</button>
                <button class="tab-btn-vertical" data-tab="ksk"><i class="fas fa-biohazard"></i> Kiểm soát nhiễm khuẩn</button>
                <button class="tab-btn-vertical" data-tab="phongbenh"><i class="fas fa-shield-virus"></i> Phòng bệnh</button>
                <button class="tab-btn-vertical" data-tab="duoc"><i class="fas fa-capsules"></i> Dược</button>
            </div>

            <div class="content-area">
                <!-- Thanh tìm kiếm -->
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" class="search-input" placeholder="Tìm kiếm tên quy trình...">
                    <button id="searchClearBtn" class="search-clear"><i class="fas fa-times-circle"></i></button>
                </div>

                <div id="subTabsContainer" style="display: none;">
                    <div class="sub-tabs">
                        <button class="sub-tab-btn active-sub" data-sub="yhct">Y học cổ truyền</button>
                        <button class="sub-tab-btn" data-sub="phcn">Phục hồi chức năng</button>
                        <button class="sub-tab-btn" data-sub="dienquang">Chẩn đoán hình ảnh</button>
                        <button class="sub-tab-btn" data-sub="noikhoa">Nội khoa</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table class="proc-table" id="procedureTable">
                        <thead>
                            <tr><th>Tên quy trình</th><th>Bộ Y tế</th><th>Bệnh viện</th><th>File quy trình</th></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                
                <div id="paginationContainer" class="pagination"></div>
            </div>
        </div>
        
        <div class="footer-note">
            <div><i class="far fa-copyright"></i> <span id="currentYear"></span> Bệnh viện Y học cổ truyền Quảng Nam</div>
            <div><i class="fas fa-code"></i> Tổng hợp & viết code: BSCKI. Nguyễn Văn Dũng</div>
        </div>
    </div>
</div>


</body>
</html>
